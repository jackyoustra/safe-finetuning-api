base_model: meta-llama/Meta-Llama-3.1-70B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

strict: false

chat_template: llama3
datasets:
  - path: oasst2_conversations.jsonl
    type: chat_template
    chat_template: llama3
    field_messages: messages
    message_field_role: role
    message_field_content: content
    roles:
      user: ["user"]
      assistant: ["assistant"]
    roles_to_train: ["assistant"]
    train_on_eos: last

dataset_prepared_path: last_run_prepared_oasst2
val_set_size: 0.05  # ~35 conversations
output_dir: ./outputs/out/oasst2-llama3-70b-instruct

adapter: lora
lora_model_dir:

sequence_len: 1024  # Power of 2, covers >95% of data, efficient with packing
sample_packing: true
pad_to_sequence_len: true

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj

wandb_project: llama31_70b_oasst2_finetuning
wandb_entity: YOUR_WANDB_ENTITY_HERE

gradient_accumulation_steps: 1
micro_batch_size: 14
num_epochs: 20
learning_rate: 2e-4
warmup_steps: 2
weight_decay: 0.01
optimizer: adamw_torch
auto_resume_from_checkpoints: true

train_on_inputs: false
group_by_length: false
bf16: auto
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: true
logging_steps: 1

flash_attention: true

plugins:
  - axolotl.integrations.liger.LigerPlugin
liger_rope: true
liger_rms_norm: true
liger_swiglu: true
liger_fused_linear_cross_entropy: true

eval_sample_packing: false
eval_steps: 0.5
save_steps: 0.5
evaluation_strategy: steps
save_strategy: steps
save_total_limit: 10000

fsdp:
  - full_shard
  - auto_wrap
fsdp_config:
  fsdp_limit_all_gathers: false
  fsdp_sync_module_states: true
  fsdp_offload_params: false
  fsdp_use_orig_params: false
  fsdp_cpu_ram_efficient_loading: true
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_transformer_layer_cls_to_wrap: LlamaDecoderLayer
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_sharding_strategy: FULL_SHARD

special_tokens:
  pad_token: <|end_of_text|>
